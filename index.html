function Donut({data,size=130,thick=24,center,sub}){
  const r=(size-thick)/2,cx=size/2,cy=size/2;
  const tot=data.reduce((s,d)=>s+d.v,0),circ=2*Math.PI*r;
  let cum=0;
  return e("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`,style:{display:"block",flexShrink:0}},
    ...data.map((d,i)=>{
      const pct=d.v/tot,dash=pct*circ,off=-(cum/tot)*circ;
      cum+=d.v;
      return e("circle",{key:i,cx,cy,r,fill:"none",stroke:d.c,strokeWidth:thick,
        strokeDasharray:`${dash} ${circ-dash}`,strokeDashoffset:off,
        transform:`rotate(-90 ${cx} ${cy})`});
    }),
    e("text",{x:cx,y:cy-1,textAnchor:"middle",fontSize:22,fontWeight:800,fill:C.navy,fontFamily:sf},center),
    sub&&e("text",{x:cx,y:cy+13,textAnchor:"middle",fontSize:10,fill:C.slate,fontFamily:sf},sub)
  );
}

function HBar({items,total,h=22,label}){
  return e("div",{style:{marginBottom:5}},
    label&&e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,fontFamily:sf,marginBottom:2}},
      e("span",{style:{fontWeight:700,color:C.navy}},label),
      e("span",{style:{color:C.slate,fontSize:11}},"n="+total)
    ),
    e("div",{style:{display:"flex",height:h,borderRadius:h/2,overflow:"hidden",background:"#e5e7eb"}},
      ...items.map((it,i)=>{
        const w=(it.v/total)*100;
        if(w===0)return null;
        return e("div",{key:i,style:{width:w+"%",background:it.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:700}},
          w>14?Math.round(w)+"%":"");
      })
    )
  );
}

function Waffle({value,total,color,size=8,cols=10}){
  const filled=Math.round((value/total)*100);
  return e("div",{style:{display:"flex",flexWrap:"wrap",width:cols*(size+2),gap:2}},
    ...Array.from({length:100},(_,i)=>
      e("div",{key:i,style:{width:size,height:size,borderRadius:1.5,background:i<filled?color:"#ddd9d0"}}))
  );
}

const rejB=[

  {a:"Codex",AF:54,N:19,U:40,t:113},
];
const merB=[
  {a:"Claude Code",FL:0,HI:0,NF:8,U:0,t:8},{a:"Copilot",FL:13,HI:16,NF:11,U:9,t:49},
  {a:"Cursor",FL:1,HI:0,NF:30,U:2,t:33},{a:"Devin",FL:14,HI:11,NF:74,U:8,t:107},

function Sec({title,children,accent=C.wine,sub}){

}

function Leg({items}){

      e("strong",null,l.v)," ",e("span",{style:{color:C.slate}},l.l)
    ))

}

function Poster(){

      ),
      e("div",{style:{background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"8px 12px",textAlign:"center"}},

              {rq:"RQ2",q:"How does human involvement shape successful Agentic-PRs?",d:"Examining whether merged PRs reflect autonomous completion or collaborative refinement.",c:C.sage},
            ].map(r=>e("div",{key:r.rq,style:{background:`${r.c}0a`,border:`1.5px solid ${r.c}35`,borderRadius:6,padding:"7px 10px",display:"flex",gap:8,alignItems:"flex-start",marginBottom:6}},

              e("div",null,

            e("svg",{width:"100%",viewBox:"0 0 240 290",style:{display:"block"}},
              e("defs",null,e("marker",{id:"ar",viewBox:"0 0 10 10",refX:8,refY:5,markerWidth:5,markerHeight:5,orient:"auto"},
                e("path",{d:"M2 2L8 5L2 8",fill:"none",stroke:C.slate,strokeWidth:1.5,strokeLinecap:"round",strokeLinejoin:"round"})
              )),
              ...[
                {y:0,t:"AIDev Dataset",s:"Closed PRs · ≥500★",c:C.sage,n:"11,048"},
                {y:74,t:"Human Review Filter",s:"Remove bot-only",c:C.sage,n:"9,799"},
                {y:148,t:"Stratified Sampling",s:"Balanced per agent",c:C.amber,n:"717"},
                {y:222,t:"Manual Coding",s:"2 coders · κ ≈ 0.90",c:C.wine,n:"coded"},
              ].flatMap((s,i)=>[
                e("rect",{key:"r"+i,x:0,y:s.y,width:196,height:54,rx:8,fill:`${s.c}12`,stroke:s.c,strokeWidth:1.2}),

                e("text",{key:"s"+i,x:10,y:s.y+40,fontSize:10,fill:C.slate,fontFamily:sf},s.s),
                e("rect",{key:"b"+i,x:202,y:s.y+11,width:36,height:32,rx:6,fill:s.c}),

            )

            e("div",{style:{display:"flex",gap:10,alignItems:"center",marginBottom:8}},
              e(Waffle,{value:6179,total:9799,color:C.sage}),
              e("div",null,
                e("div",{style:{display:"flex",alignItems:"center",gap:4,marginBottom:3,fontSize:13,fontWeight:700}},e("div",{style:{width:11,height:11,borderRadius:2,background:C.sage}})," 63% Merged (6,179)"),
                e("div",{style:{display:"flex",alignItems:"center",gap:4,fontSize:13,fontWeight:700}},e("div",{style:{width:11,height:11,borderRadius:2,background:"#ddd9d0"}})," 37% Rejected (3,620)")
              )
            ),
            ...[
              {a:"Codex",p:40.7,c:C.codex},{a:"Devin",p:34.5,c:C.devin},
              {a:"Copilot",p:14.6,c:C.copilot},{a:"Cursor",p:8.0,c:C.cursor},
              {a:"Claude",p:2.2,c:C.claude},
            ].map(d=>e("div",{key:d.a,style:{display:"flex",alignItems:"center",gap:5,marginBottom:4}},
              e("span",{style:{fontSize:11,fontWeight:600,color:C.navy,width:48,textAlign:"right"}},d.a),
              e("div",{style:{flex:1,height:16,background:"#e5e7eb",borderRadius:8,overflow:"hidden"}},
                e("div",{style:{width:`${Math.max(d.p*2.2,8)}%`,height:"100%",background:d.c,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:4}},
                  d.p>5?e("span",{style:{fontSize:9,fontWeight:700,color:"#fff"}},d.p+"%"):null
                )
              ),
              d.p<=5?e("span",{style:{fontSize:9,color:C.slate}},d.p+"%"):null
            ))
          ),
          e("div",{style:{display:"flex",gap:6}},

        e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
          e(Sec,{title:"RQ1 — Why Are Agentic-PRs Rejected?",accent:C.AF,sub:"Among 353 rejected Agentic-PRs, only about one-third correspond to observable technical failures such as failing CI checks or broken tests."},
            e("div",{style:{display:"flex",gap:12,alignItems:"center",marginBottom:8}},
              e(Donut,{size:130,thick:24,center:"353",sub:"rejected",data:[{v:126,c:C.AF},{v:110,c:C.NonAF},{v:117,c:C.Unk}]}),
              e("div",{style:{flex:1}},

                mkStatCard([{icon:"⚠",n:"126",l:"CI / test failures",c:C.AF},{icon:"↻",n:"110",l:"Workflow causes",c:C.NonAF},{icon:"?",n:"117",l:"Silent closures",c:C.Unk}])
              )
            ),
            e("div",{style:{fontSize:13,fontWeight:700,color:C.navy,marginBottom:3}},"Per-agent rejection breakdown"),

        )

      // COL 3
      e("div",{style:{padding:"12px 14px 10px 10px",display:"flex",flexDirection:"column",justifyContent:"space-between"}},
        e("div",{style:{display:"flex",flexDirection:"column",gap:12}},
          e(Sec,{title:"Cross-Agent Map",accent:C.HI,sub:"Systematic differences across agents align with repository practices such as CI gating, iterative review norms, and contribution policies."},
            e("svg",{width:"100%",viewBox:"0 0 260 190",style:{display:"block"}},
              e("rect",{x:0,y:0,width:260,height:190,rx:6,fill:C.card,stroke:C.sandD,strokeWidth:1}),
              e("line",{x1:130,y1:6,x2:130,y2:184,stroke:C.sandD,strokeWidth:1,strokeDasharray:"4 3"}),
              e("line",{x1:6,y1:95,x2:254,y2:95,stroke:C.sandD,strokeWidth:1,strokeDasharray:"4 3"}),
              e("text",{x:65,y:186,textAnchor:"middle",fontSize:9,fill:C.slate,fontFamily:sf},"Workflow-heavy"),
              e("text",{x:195,y:186,textAnchor:"middle",fontSize:9,fill:C.slate,fontFamily:sf},"Minimal interaction"),

            e("div",{style:{fontSize:16,fontWeight:800,lineHeight:1.35}},"PR outcomes alone are unreliable indicators of agent performance."),
            e("div",{style:{fontSize:13,opacity:0.9,lineHeight:1.45,marginTop:6}},"Evaluation approaches should move beyond outcome-based metrics and incorporate interaction-level evidence such as review comments, CI signals, commit histories, and authorship changes.")

          e(Sec,{title:"Contributions",accent:C.navy},
