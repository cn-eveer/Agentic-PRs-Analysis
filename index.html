<title>MSR '26 Poster — Revised</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>

<div id="root"></div>
<script>
const e = React.createElement;
const sf = "'Segoe UI','Helvetica Neue',Arial,sans-serif";
const C = {
  wine:"#6b2d3e",wineL:"#f5eaed",sage:"#3d6b5e",sageL:"#e4efe9",
  navy:"#2c3e5a",navyL:"#e8ecf1",amber:"#b8860b",slate:"#5a6577",
  sand:"#f5f2ec",sandD:"#ddd7ce",card:"#fff",
  AF:"#9e3a4a",NonAF:"#c9873e",Unk:"#9ca3af",
  FL:"#3a6e9e",HI:"#7c5ca3",NoFL:"#4a8c6e",UnkM:"#bfc5cc",
  codex:"#5b8abf",devin:"#7c5ca3",copilot:"#c9873e",cursor:"#4a8c6e",claude:"#9e3a4a",
};

const rejB=[
  {a:"Claude Code",AF:1,N:4,U:3,t:8},{a:"Copilot",AF:19,N:17,U:21,t:57},
  {a:"Cursor",AF:15,N:1,U:6,t:22},{a:"Devin",AF:37,N:69,U:47,t:153},
  {a:"Codex",AF:54,N:19,U:40,t:113},
];
const merB=[
  {a:"Claude Code",FL:0,HI:0,NF:8,U:0,t:8},{a:"Copilot",FL:13,HI:16,NF:11,U:9,t:49},
  {a:"Cursor",FL:1,HI:0,NF:30,U:2,t:33},{a:"Devin",FL:14,HI:11,NF:74,U:8,t:107},
  {a:"Codex",FL:0,HI:1,NF:165,U:1,t:167},
];

function Donut({data,size=120,thick=22,center,sub}){
  const r=(size-thick)/2,cx=size/2,cy=size/2;
  const tot=data.reduce((s,d)=>s+d.v,0),circ=2*Math.PI*r;
  let cum=0;
  return e("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`,style:{display:"block",flexShrink:0}},
    ...data.map((d,i)=>{const pct=d.v/tot,dash=pct*circ,off=-(cum/tot)*circ;cum+=d.v;
      return e("circle",{key:i,cx,cy,r,fill:"none",stroke:d.c,strokeWidth:thick,strokeDasharray:`${dash} ${circ-dash}`,strokeDashoffset:off,transform:`rotate(-90 ${cx} ${cy})`});}),
    e("text",{x:cx,y:cy-2,textAnchor:"middle",fontSize:size*.24,fontWeight:800,fill:C.navy,fontFamily:sf},center),
    sub&&e("text",{x:cx,y:cy+size*.1,textAnchor:"middle",fontSize:size*.12,fill:C.slate,fontFamily:sf},sub));
}

function HBar({items,total,h=12,label}){
  return e("div",{style:{marginBottom:3}},
    e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,marginBottom:1,fontFamily:sf}},
      e("span",{style:{fontWeight:700,color:C.navy}},label),
      e("span",{style:{color:C.slate}},`n=${total}`)),
    e("div",{style:{display:"flex",height:h,borderRadius:h/2,overflow:"hidden",background:"#e5e7eb"}},
      ...items.map((it,i)=>{const w=(it.v/total)*100;if(!w)return null;
        return e("div",{key:i,style:{width:w+"%",background:it.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8.5,color:"#fff",fontWeight:700}},w>15?Math.round(w)+"%":"");})));
}

function Waffle({value,total,color,size=6,cols=8}){
  const filled=Math.round((value/total)*54);
  return e("div",{style:{display:"flex",flexWrap:"wrap",width:cols*(size+10),gap:3}},
    ...Array.from({length:54},(_,i)=>e("div",{key:i,style:{width:size,height:size,borderRadius:1.5,background:i<filled?color:"#ddd9d0"}})));
}

function Sec({title,sub,accent=C.wine,children}){
  return e("div",null,
    e("div",{style:{fontSize:12.5,fontWeight:800,color:accent,textTransform:"uppercase",letterSpacing:.7,borderBottom:`2px solid ${accent}`,paddingBottom:2,marginBottom:sub?2:4}},title),
    sub&&e("div",{style:{fontSize:11.5,color:"#444",lineHeight:1.3,marginBottom:4}},sub),
    children);
}

function Leg({items}){
  return e("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:3}},
    ...items.map(item=>e("div",{key:item.l,style:{display:"flex",alignItems:"center",gap:3,fontSize:12,fontFamily:sf}},
      e("div",{style:{width:9,height:9,borderRadius:2,background:item.c}}),
      e("strong",null,item.v),e("span",{style:{color:C.slate}},item.l))));
}

function MiniCards({items}){
  return e("div",{style:{display:"flex",gap:3,marginTop:3}},
    ...items.map(x=>e("div",{key:x.l,style:{flex:1,background:`${x.c}0c`,borderRadius:5,padding:"3px 2px",textAlign:"center"}},
      e("div",{style:{fontSize:12}},x.icon),
      e("div",{style:{fontSize:14,fontWeight:800,color:x.c,lineHeight:1.1}},x.n),
      e("div",{style:{fontSize:12,color:C.slate,lineHeight:1.2}},x.l))));
}

function BulletPills({items,color}){
  return e("div",{style:{display:"flex",gap:3}},
    ...items.map((t,i)=>e("div",{key:i,style:{background:`${color}12`,alignContent:"center",border:`1px solid ${color}24`,borderRadius:5,padding:"4px 5px",fontSize:10,fontWeight:700,color,lineHeight:1.25,textAlign:"center"}},t)));
}

function Callout({text,color}){
  return e("div",{style:{background:`${color}0d`,borderLeft:`3px solid ${color}`,borderRadius:"0 5px 5px 0",padding:"5px 7px",marginTop:4}},
    e("div",{style:{fontSize:12,fontWeight:700,color,lineHeight:1.3}},text));
}

/* ─── NEW: Example boxes ─── */
function ExampleBox(props){
  var title=props.title, steps=props.steps, accent=props.accent;
  var header = e("div",{style:{fontSize:8.5,fontWeight:800,color:accent,textTransform:"uppercase",letterSpacing:.3,marginBottom:2}},"\uD83D\uDD0D Example: "+title);
  var rows = steps.map(function(s,i){
    return e("div",{key:i,style:{display:"flex",gap:4,alignItems:"center",marginBottom:1}},
      e("span",{style:{fontSize:10,fontWeight:800,color:"#fff",background:s.c||accent,borderRadius:2,padding:"1px 3px",flexShrink:0,lineHeight:1.2}},s.tag),
      e("span",{style:{fontSize:10,fontWeight:700,color:C.navy,flexShrink:0}},s.label),
      e("span",{style:{fontSize:9,color:C.slate}},s.text)
    );
  });
  return e("div",{style:{background:accent+"08",border:"1px solid "+accent+"28",borderRadius:5,padding:"4px 6px",marginTop:3}},
    header,
    ...rows
  );
}

function StatRibbon(){
  const stats=[
    {v:"11,048",l:"Closed PRs",c:C.navy},{v:"9,799",l:"Human-reviewed",c:C.sage},
    {v:"717",l:"Manually coded",c:C.wine},{v:"35.7%",l:"Rejection = agent fail",c:C.AF},
    {v:"15.4%",l:"Merges = human",c:C.FL}];
  return e("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",background:C.card,borderBottom:`1px solid ${C.sandD}`}},
    ...stats.map((s,i)=>e("div",{key:i,style:{textAlign:"center",padding:"6px 3px",borderRight:i<4?`1px solid ${C.sandD}`:"none",background:`${s.c}06`}},
      e("div",{style:{fontSize:19,fontWeight:800,color:s.c,lineHeight:1}},s.v),
      e("div",{style:{fontSize:12,color:C.slate,marginTop:1}},s.l))));
}

function DatasetBars(){
  const items=[{a:"Codex",p:40.7,c:C.codex},{a:"Devin",p:34.5,c:C.devin},{a:"Copilot",p:14.6,c:C.copilot},{a:"Cursor",p:8.0,c:C.cursor},{a:"Claude",p:2.2,c:C.claude}];
  return e("div",null,...items.map(d=>e("div",{key:d.a,style:{display:"flex",alignItems:"center",gap:10,marginBottom:6}},
    e("span",{style:{fontSize:12.5,fontWeight:700,color:C.navy,width:44,textAlign:"right"}},d.a),
    e("div",{style:{flex:1,height:13,background:"#e5e7eb",borderRadius:7,overflow:"hidden"}},
      e("div",{style:{width:`${Math.max(d.p*2.15,8)}%`,height:"100%",background:d.c,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:4}},
        d.p>5?e("span",{style:{fontSize:8,fontWeight:700,color:"#fff"}},`${d.p}%`):null)),
    d.p<=5?e("span",{style:{fontSize:8,color:C.slate,width:26}},`${d.p}%`):null)));
}

function PipelineGraphic(){
  const steps=[
    {y:0,t:"AIDev dataset",s:"Closed PRs · ≥500★",c:C.sage,n:"11,048"},
    {y:50,t:"Human review filter",s:"Remove bot-only",c:C.sage,n:"9,799"},
    {y:100,t:"Stratified sample",s:"Balanced by agent",c:C.amber,n:"717"},
    {y:150,t:"Manual coding",s:"2 coders · κ≈0.90",c:C.wine,n:"done"}];
  return e("svg",{width:"100%",viewBox:"0 0 220 205",style:{display:"block"}},
    e("defs",null,e("marker",{id:"ar",viewBox:"0 0 10 10",refX:8,refY:5,markerWidth:5,markerHeight:5,orient:"auto"},
      e("path",{d:"M2 2L8 5L2 8",fill:"none",stroke:C.slate,strokeWidth:1.3,strokeLinecap:"round",strokeLinejoin:"round"}))),
    ...steps.flatMap((s,i)=>[
      e("rect",{key:`r${i}`,x:0,y:s.y,width:182,height:36,rx:7,fill:`${s.c}12`,stroke:s.c,strokeWidth:1}),
      e("text",{key:`t${i}`,x:9,y:s.y+15,fontSize:13.5,fontWeight:700,fill:C.navy,fontFamily:sf},s.t),
      e("text",{key:`s${i}`,x:9,y:s.y+27,fontSize:12,fill:C.slate,fontFamily:sf},s.s),
      e("rect",{key:`b${i}`,x:188,y:s.y+4,width:32,height:28,rx:6,fill:s.c}),
      e("text",{key:`n${i}`,x:204,y:s.y+21,fontSize:8.5,fontWeight:700,fill:"#fff",textAnchor:"middle",fontFamily:sf},s.n),
      i<3?e("line",{key:`l${i}`,x1:91,y1:s.y+36,x2:91,y2:s.y+50,stroke:C.slate,strokeWidth:1.1,markerEnd:"url(#ar)"}):null
    ].filter(Boolean)));
}

function CrossAgentMap(){
  const bubbles=[
    {x:62,y:46,r:24,l:"Devin",c:C.devin},{x:48,y:118,r:18,l:"Copilot",c:C.copilot},
    {x:198,y:40,r:26,l:"Codex",c:C.codex},{x:194,y:131,r:16,l:"Cursor",c:C.cursor},
    {x:128,y:92,r:10,l:"Claude",c:C.claude}];
  return e("div",null,
    e("svg",{width:"100%",viewBox:"0 0 258 168",style:{display:"block"}},
      e("rect",{x:0,y:0,width:258,height:168,rx:6,fill:C.card,stroke:C.sandD,strokeWidth:1}),
      e("line",{x1:129,y1:6,x2:129,y2:162,stroke:C.sandD,strokeWidth:1,strokeDasharray:"4 3"}),
      e("line",{x1:6,y1:84,x2:252,y2:84,stroke:C.sandD,strokeWidth:1,strokeDasharray:"4 3"}),
      e("text",{x:64,y:160,textAnchor:"middle",fontSize:14,fill:C.slate,fontFamily:sf},"Workflow-heavy"),
      e("text",{x:194,y:160,textAnchor:"middle",fontSize:14,fill:C.slate,fontFamily:sf},"Minimal interaction"),
      e("text",{x:252,y:15,textAnchor:"end",fontSize:14,fill:C.slate,fontFamily:sf},"\u2191 More rejection"),
      e("text",{x:252,y:80,textAnchor:"end",fontSize:14,fill:C.slate,fontFamily:sf},"\u2193 More merges"),
      ...bubbles.flatMap(b=>[
        e("circle",{key:`c${b.l}`,cx:b.x,cy:b.y,r:b.r,fill:`${b.c}30`,stroke:b.c,strokeWidth:1.4}),
        e("text",{key:`t${b.l}`,x:b.x,y:b.y+(b.r>14?4:3),textAnchor:"middle",fontSize:b.r>14?16.2:14,fontWeight:700,fill:C.navy,fontFamily:sf},b.l)])),
    e("div",{style:{fontSize:12.5,color:C.slate,marginTop:2,textAlign:"center"}},"Bubble size \u2248 dataset share \u00B7 position = interaction pattern"));
}

function CompactPoster(){
  return e("div",{style:{width:"100%",aspectRatio:"84/119",background:C.sand,border:`3px solid ${C.wine}`,overflow:"hidden",display:"flex",flexDirection:"column",fontFamily:sf}},

    /* ─── HEADER ─── */
    e("div",{style:{background:`linear-gradient(140deg,${C.wine} 0%,${C.navy} 100%)`,color:"#fff",padding:"12px 16px 9px",display:"flex",gap:10,alignItems:"center"}},
      e("div",{style:{flex:1}},
        e("div",{style:{display:"inline-block",background:"rgba(255,255,255,0.14)",borderRadius:4,padding:"2px 8px",fontSize:9,fontWeight:700,letterSpacing:1.4,textTransform:"uppercase",marginBottom:3}},"MSR '26 · Mining Challenge"),
        e("h1",{style:{fontSize:26,fontWeight:800,lineHeight:1.12,marginBottom:2}},"Why Are Agentic Pull Requests Merged or Rejected?"),
        e("div",{style:{fontSize:14.5,opacity:.88,fontStyle:"italic",marginBottom:5}},"An Empirical Study"),
        e("div",{style:{fontSize:13,lineHeight:1.35,opacity:.82}},"S.R.O. Peralta · F. Hoshi · H. Washizaki · N. Ubayashi | Waseda · I. Kondo · Y. Higo | Osaka · H. Mukai · N. Yoshida | Ritsumeikan · K. Kusama | Kyushu · H. Tanaka · Y. Fan | NAIST")),
              e("div",{style:{background:"rgba(255,255,255,0.12)",borderRadius:8,padding:"3px 5px",textAlign:"center"}},
          e("img",{src:"./QR.svg",style:{width:84,height:84,background:"#fff",borderRadius:4,padding:0}}),
          e("div",{style:{fontSize:9.5,opacity:.7}},"Scan for paper"))),

    e(StatRibbon),

    /* ─── BODY ─── */
    e("div",{style:{flex:1,display:"grid",gridTemplateColumns:"0.88fr 1.4fr 0.88fr",minHeight:0}},

      /* ═══ LEFT COLUMN ═══ */
      e("div",{style:{padding:"8px 7px 6px 10px",display:"flex",flexDirection:"column",gap:6}},

        e(Sec,{title:"Motivation",accent:C.navy,sub:"Agentic PR performance is often judged by merge or rejection outcomes, but those labels ignore review interactions and workflow context."},
          e("div",{style:{background:`${C.wine}0a`,border:`1px solid ${C.wine}30`,borderRadius:6,padding:"5px 7px",marginBottom:4}},
            e("div",{style:{fontSize:12.2,fontWeight:700,color:C.wine,lineHeight:1.3}},"Outcomes can conflate agent behavior with repository conventions, reviewer actions, and closure practices.")),
          e(BulletPills,{items:["Merge rates miss context","Decisions live in review","Workflows shape outcomes"],color:C.navy})),

        e(Sec,{title:"Research Questions",accent:C.navy},
          ...[{rq:"RQ1",q:"What drives Agentic-PR rejections?",d:"Separate agent failures from workflow-driven and undocumented closures.",c:C.wine},
              {rq:"RQ2",q:"How do humans shape successful PRs?",d:"Test whether merged PRs are autonomous or collaboratively refined.",c:C.sage}
          ].map(r=>e("div",{key:r.rq,style:{background:`${r.c}0a`,border:`1px solid ${r.c}35`,borderRadius:6,padding:"5px 7px",display:"flex",gap:6,alignItems:"flex-start",marginBottom:4}},
            e("div",{style:{minWidth:28,height:28,borderRadius:5,background:r.c,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,flexShrink:0}},r.rq),
            e("div",null,
              e("div",{style:{fontSize:14,fontWeight:700,color:C.navy,lineHeight:1.25}},r.q),
              e("div",{style:{fontSize:9.4,color:C.slate,lineHeight:1.25,marginTop:1}},r.d))))),

        e(Sec,{title:"Study Pipeline",accent:C.sage,sub:"Used AIDev Dataset of 11K+ closed PRs with human review, stratified sampling, and manual coding to analyze outcomes in context."},
          e(PipelineGraphic)),

        e(Sec,{title:"Dataset",accent:C.sage,sub:"9,799 human-reviewed PRs; Codex and Devin dominate the submission pool."},
          e("div",{style:{display:"flex",gap:6,alignItems:"center",marginBottom:4}},
            e(Waffle,{value:6179,total:9799,color:C.sage,size:8,cols:7}),
            e("div",null,
              e("div",{style:{display:"flex",alignItems:"center",gap:3,marginBottom:2,fontSize:12.5,fontWeight:700}},
                e("div",{style:{width:9,height:9,borderRadius:2,background:C.sage}}),"63% Merged (6,179)"),
              e("div",{style:{display:"flex",alignItems:"center",gap:3,fontSize:12.5,fontWeight:700}},
                e("div",{style:{width:9,height:9,borderRadius:2,background:"#ddd9d0"}}),"37% Rejected (3,620)"))),
          e(DatasetBars),
          e("div",{style:{display:"flex",gap:4,marginTop:4}},
            ...[{l:"RQ1",v:"κ≈0.90"},{l:"RQ2",v:"κ=1.00"}].map(k=>
              e("div",{key:k.l,style:{flex:1,background:C.navyL,borderRadius:5,padding:"5px 6px",textAlign:"center"}},
                e("div",{style:{fontSize:15,fontWeight:800,color:C.navy,lineHeight:1}},k.v),
                e("div",{style:{fontSize:8.5,color:C.slate,marginTop:1}},k.l)))))),

      /* ═══ CENTER COLUMN ═══ */
      e("div",{style:{padding:"8px 10px",background:C.card,borderLeft:`1px solid ${C.sandD}`,borderRight:`1px solid ${C.sandD}`,display:"flex",flexDirection:"column",gap:6}},

        /* RQ1 */
        e(Sec,{title:"RQ1 — Why Are Agentic-PRs Rejected?",accent:C.AF,sub:"Only about one-third of rejected PRs reflect observable technical failures."},
          e("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:4}},
            e(Donut,{size:116,thick:20,center:"353",sub:"rejected",data:[{v:126,c:C.AF},{v:110,c:C.NonAF},{v:117,c:C.Unk}]}),
            e("div",{style:{flex:1}},
              e(Leg,{items:[{l:"Agentic failure",c:C.AF,v:"35.7%"},{l:"Non-agentic",c:C.NonAF,v:"31.2%"},{l:"Unknown",c:C.Unk,v:"33.1%"}]}),
              e(MiniCards,{items:[{icon:"⚠",n:"126",l:"CI / test failures",c:C.AF},{icon:"↻",n:"110",l:"Workflow causes",c:C.NonAF},{icon:"?",n:"117",l:"Silent closures",c:C.Unk}]}))),
          e("div",{style:{fontSize:10.5,fontWeight:700,color:C.navy,marginBottom:2}},"Per-agent rejection breakdown"),
          ...rejB.map(r=>e(HBar,{key:r.a,label:r.a,total:r.t,items:[{v:r.AF,c:C.AF},{v:r.N,c:C.NonAF},{v:r.U,c:C.Unk}]})),
          e(Callout,{text:"Rejections overstate agent error: Devin rejections were often workflow-driven, while Codex had the highest share of genuine agentic failure.",color:C.AF}),

          /* ─── RQ1 EXAMPLE ─── */
          e(ExampleBox,{title:"Agentic Failure",accent:C.AF,steps:[
            {tag:"PR",c:C.codex,label:"Codex opens PR #4821",text:"feat: add retry logic to API client"},
            {tag:"CI",c:"#c0392b",label:"CI pipeline fails",text:"✗ 3 test failures: timeout not handled in edge cases"},
            {tag:"Rev",c:C.slate,label:"Reviewer comments",text:"\"Tests are failing — retry doesn't back off on 429s\""},
            {tag:"✗",c:"#c0392b",label:"Closed without fix",text:"Agent did not respond → PR closed after 7 days"}
          ]})),

        /* RQ2 */
        e(Sec,{title:"RQ2: How Do Humans Shape Successful PRs?",accent:C.FL,sub:"Most merged PRs are autonomous; only 15.4% show clear human involvement."},
          e("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:4}},
            e(Donut,{size:116,thick:20,center:"364",sub:"merged",data:[{v:28,c:C.FL},{v:28,c:C.HI},{v:288,c:C.NoFL},{v:20,c:C.UnkM}]}),
            e("div",{style:{flex:1}},
              e(Leg,{items:[{l:"Feedback loop",c:C.FL,v:"7.7%"},{l:"Human commits",c:C.HI,v:"7.7%"},{l:"No feedback",c:C.NoFL,v:"79.1%"},{l:"Unknown",c:C.UnkM,v:"5.5%"}]}),
              e(MiniCards,{items:[{icon:"💬",n:"28",l:"Reviewer→agent revises",c:C.FL},{icon:"✏️",n:"28",l:"Reviewer commits",c:C.HI},{icon:"✓",n:"288",l:"Merged autonomously",c:C.NoFL}]}))),
          e("div",{style:{fontSize:10.5,fontWeight:700,color:C.navy,marginBottom:2}},"Per-agent merge interaction"),
          ...merB.map(r=>e(HBar,{key:r.a,label:r.a,total:r.t,items:[{v:r.FL,c:C.FL},{v:r.HI,c:C.HI},{v:r.NF,c:C.NoFL},{v:r.U,c:C.UnkM}]})),
          e(Callout,{text:"Copilot and Devin account for nearly all human-involved merges. Codex and Cursor merge mostly without iterative review.",color:C.FL}),

          /* ─── RQ2 EXAMPLE ─── */
          e(ExampleBox,{title:"Human-Involved Merge",accent:C.FL,steps:[
            {tag:"PR",c:C.devin,label:"Devin opens PR #1037",text:"fix: resolve race condition in job scheduler"},
            {tag:"Rev",c:C.FL,label:"Reviewer requests changes",text:"\"Mutex scope is too broad — wrap only the critical section\""},
            {tag:"Fix",c:C.devin,label:"Agent pushes revision",text:"Narrowed lock to scheduler.enqueue() block only"},
            {tag:"✓",c:C.NoFL,label:"Reviewer approves & merges",text:"\"Looks good — much cleaner. Merging.\""}
          ]}))),

      /* ═══ RIGHT COLUMN ═══ */
      e("div",{style:{padding:"8px 10px 6px 7px",display:"flex",flexDirection:"column",gap:8}},

        e("div",{style:{background:`${C.amber}08`,border:`1px solid ${C.amber}30`,borderRadius:7,padding:"7px 9px"}},
          e("div",{style:{fontSize:14,fontWeight:800,color:C.amber,textTransform:"uppercase",letterSpacing:.5,marginBottom:2}},"Discussion"),
          e("div",{style:{fontSize:12,color:C.navy,lineHeight:1.35}},"PR outcomes reflect both agent behavior and repository workflow. Silent closures remain a major source of uncertainty.")),

        e(Sec,{title:"Cross-Agent Map",accent:C.HI,sub:"Agent differences align with repository practices such as CI gating and iterative review norms."},
          e(CrossAgentMap)),

        e("div",{style:{background:`linear-gradient(135deg,${C.wine} 0%,${C.navy} 100%)`,borderRadius:9,padding:"9px 11px",color:"#fff"}},
