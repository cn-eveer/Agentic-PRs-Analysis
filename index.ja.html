  function Donut({ data, size = 120, thick = 22, center, sub }) {
    const r = (size - thick) / 2,
      cx = size / 2,
      cy = size / 2;
    const tot = data.reduce((s, d) => s + d.v, 0),
      circ = 2 * Math.PI * r;
    let cum = 0;
    return e(
      "svg",
      {
        width: size,
        height: size,
        viewBox: `0 0 ${size} ${size}`,
        style: { display: "block", flexShrink: 0 },
      },
      ...data.map((d, i) => {
        const pct = d.v / tot,
          dash = pct * circ,
          off = -(cum / tot) * circ;
        cum += d.v;
        return e("circle", {
          key: i,
          cx,
          cy,
          r,
          fill: "none",
          stroke: d.c,
          strokeWidth: thick,
          strokeDasharray: `${dash} ${circ - dash}`,
          strokeDashoffset: off,
          transform: `rotate(-90 ${cx} ${cy})`,
        });
      }),
      e(
        "text",
        {
          x: cx,
          y: cy - 2,
          textAnchor: "middle",
          fontSize: size * 0.18,
          fontWeight: 800,
          fill: C.navy,
          fontFamily: sf,

        center,

            textAnchor: "middle",
            fontSize: size * 0.075,
            fill: C.slate,
            fontFamily: sf,
          },
          sub,
        ),
    );
  }
